<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Day — meilleur jour pour votre activité</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --card-2: #273449;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #38bdf8;
            --good: #22c55e;
            --mid: #eab308;
            --bad: #ef4444;
            --border: #334155;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(160deg, #0f172a, #111c33);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container { max-width: 760px; margin: 0 auto; }

        header h1 { margin: 0 0 .25rem; font-size: 1.9rem; }
        header h1 span { color: var(--accent); }
        header p { margin: 0 0 1.75rem; color: var(--muted); }

        form {
            display: flex;
            flex-wrap: wrap;
            gap: .75rem;
            background: var(--card);
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: 14px;
        }

        .field { display: flex; flex-direction: column; gap: .35rem; flex: 1 1 180px; }
        label { font-size: .8rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }

        input, select, button {
            font-size: 1rem;
            padding: .65rem .8rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--card-2);
            color: var(--text);
        }

        button {
            cursor: pointer;
            background: var(--accent);
            color: #062032;
            font-weight: 700;
            border: none;
            align-self: flex-end;
            flex: 0 0 auto;
            padding: .65rem 1.4rem;
        }
        button:hover { filter: brightness(1.08); }
        button:disabled { opacity: .6; cursor: progress; }

        #status { margin: 1.25rem 0; min-height: 1.2rem; color: var(--muted); }
        #status.error { color: var(--bad); }

        .best {
            background: linear-gradient(135deg, #155e3f, #1e293b);
            border: 1px solid #2f7d57;
            border-radius: 14px;
            padding: 1.25rem 1.4rem;
            margin-bottom: 1.5rem;
        }
        .best .tag { font-size: .75rem; text-transform: uppercase; letter-spacing: .08em; color: #86efac; }
        .best .day { font-size: 1.4rem; font-weight: 700; margin: .2rem 0; }
        .best .reason { color: var(--text); opacity: .9; }
        .best .loc { color: var(--muted); font-size: .9rem; margin-top: .35rem; }

        h2 { font-size: 1rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin: 0 0 .75rem; }

        .day-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: .85rem 1rem;
            margin-bottom: .7rem;
            display: grid;
            grid-template-columns: 56px 1fr;
            gap: .9rem;
            align-items: center;
        }
        .score-badge {
            width: 56px; height: 56px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 1.2rem;
            color: #06121f;
        }
        .day-card .date { font-weight: 600; }
        .day-card .reason { color: var(--muted); font-size: .9rem; margin-top: .15rem; }
        .subs { display: flex; gap: .8rem; margin-top: .45rem; font-size: .78rem; color: var(--muted); }
        .subs b { color: var(--text); }

        footer { margin-top: 2rem; color: var(--muted); font-size: .8rem; text-align: center; }
        footer code { color: var(--accent); }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1><span>Best</span> Day</h1>
        <p>Le meilleur jour des 7 prochains pour votre activité, selon la météo (Open-Meteo).</p>
    </header>

    <form id="form">
        <div class="field">
            <label for="city">Ville</label>
            <input id="city" name="city" type="text" value="Paris" placeholder="Paris" required>
        </div>
        <div class="field">
            <label for="activity">Activité</label>
            <select id="activity" name="activity">
                <option value="running">Running 🏃</option>
                <option value="cycling">Cycling 🚴</option>
                <option value="picnic">Picnic 🧺</option>
                <option value="beach">Beach 🏖️</option>
            </select>
        </div>
        <button id="submit" type="submit">Trouver</button>
    </form>

    <div id="status"></div>
    <div id="best"></div>
    <div id="ranking"></div>

    <footer>
        Appelle <code>GET /api/best-day?city=…&amp;activity=…</code> — projet M1 MIAGE DevOps 2.
    </footer>
</div>

<script>
    const form = document.getElementById('form');
    const statusEl = document.getElementById('status');
    const bestEl = document.getElementById('best');
    const rankingEl = document.getElementById('ranking');
    const submitBtn = document.getElementById('submit');

    function scoreColor(score) {
        if (score >= 66) return 'var(--good)';
        if (score >= 40) return 'var(--mid)';
        return 'var(--bad)';
    }

    function formatDate(iso) {
        const d = new Date(iso + 'T00:00:00');
        return d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
    }

    function render(data) {
        const b = data.bestDay;
        bestEl.innerHTML = `
            <div class="best">
                <div class="tag">Meilleur jour pour ${data.activity}</div>
                <div class="day">${formatDate(b.date)} — ${b.score}/100</div>
                <div class="reason">${b.reason}</div>
                <div class="loc">📍 ${data.resolvedLocation}</div>
            </div>`;

        rankingEl.innerHTML = '<h2>Classement des 7 jours</h2>' + data.ranking.map(d => `
            <div class="day-card">
                <div class="score-badge" style="background:${scoreColor(d.score)}">${d.score}</div>
                <div>
                    <div class="date">${formatDate(d.date)}</div>
                    <div class="reason">${d.reason}</div>
                    <div class="subs">
                        <span>🌡️ Temp <b>${d.temperatureScore}</b></span>
                        <span>🌧️ Pluie <b>${d.precipitationScore}</b></span>
                        <span>💨 Vent <b>${d.windScore}</b></span>
                    </div>
                </div>
            </div>`).join('');
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const city = document.getElementById('city').value.trim();
        const activity = document.getElementById('activity').value;
        if (!city) return;

        statusEl.className = '';
        statusEl.textContent = 'Recherche en cours…';
        bestEl.innerHTML = '';
        rankingEl.innerHTML = '';
        submitBtn.disabled = true;

        try {
            const url = `/api/best-day?city=${encodeURIComponent(city)}&activity=${encodeURIComponent(activity)}`;
            const res = await fetch(url);
            if (!res.ok) {
                const problem = await res.json().catch(() => ({}));
                throw new Error(problem.detail || `Erreur ${res.status}`);
            }
            const data = await res.json();
            statusEl.textContent = '';
            render(data);
        } catch (err) {
            statusEl.className = 'error';
            statusEl.textContent = '⚠️ ' + err.message;
        } finally {
            submitBtn.disabled = false;
        }
    });

    // Lance une recherche par défaut au chargement.
    form.dispatchEvent(new Event('submit'));
</script>
</body>
</html>
